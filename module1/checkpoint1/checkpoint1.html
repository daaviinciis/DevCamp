<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Grid Assignment</title>
    <link rel="stylesheet" href="styles1.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    <div class="gridOne">
        <p>Hello World</p>
        <p style="color: blue;">My Fantastic Content</p>
    </div>

    <div class="gridTwo">
        <div class="box1"><p>Whatever</p></div>
        <div class="box2"><p>text</p></div>
        <div class="box3"><p>I want</p></div>
    </div>

    <div class="gridThree">
        <div><p>The text I choose is Awesome</p></div>
        <div>
            <img src="https://images.unsplash.com/photo-1478265409131-1f65c88f965c?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
    </div>

    <div class="gridFour">
        <div class="first">
            <p>My Even More Awesome Text</p>
        </div>

        <div id="nested">
            <p>My left text</p>
            <p>My rigth text</p>
        </div>
    </div>

    <div class="gridFive">
        <div class="firstChild">
            <p>My Even More Awesome Text</p>
        </div>

        <div class="images">
            <img src="https://images.unsplash.com/photo-1487782310695-ed8583618566?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
            <img src="https://images.unsplash.com/photo-1551582045-6ec9c11d8697?q=80&w=765&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
    </div>

    <div class="gridSix">
        <i class="fa-solid fa-rocket"></i>
        <p><b>MY AWESOME GOOGLE FONT IS APLLIED HERE</b></p>
    </div>
</body>
</html>
